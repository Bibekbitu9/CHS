        /* Fade out logic for simulation */

<script>
        // Simulate a loading sequence
        window.addEventListener('load', () => {
            const overlay = document.getElementById('loading-overlay');
            const mainContent = document.querySelector('main');

            // Wait 3.5 seconds to showcase the animation as requested for a high-end experience
            setTimeout(() => {
                overlay.style.opacity = '0';
                mainContent.classList.remove('opacity-0');
                mainContent.classList.add('transition-opacity', 'duration-1000', 'opacity-100');
                
                // Remove from DOM after transition
                setTimeout(() => {
                    overlay.remove();
                }, 800);
            }, 4000);
        });

        // Add subtle hover interaction to simulation content
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const overlay = document.querySelector('.parchment-overlay');
            if (overlay) {
                overlay.style.transform = `translate(${x * 5}px, ${y * 5}px)`;
            }
        });
    </script>
